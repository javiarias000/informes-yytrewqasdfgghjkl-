<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Informes Finales – Google Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .step { transition: all .2s; }
    select { background-image: none; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-sm">
<div class="max-w-4xl mx-auto p-5 space-y-5">

  <!-- Header -->
  <div class="bg-white rounded-2xl shadow p-5">
    <h1 class="text-xl font-bold text-gray-800">📋 Informes Finales — Google Form</h1>
    <p class="text-gray-400 mt-1 text-xs">Configura las hojas y columnas de cada materia, luego genera y envía los formularios.</p>
  </div>

  <!-- Auth -->
  <div id="authNeeded" class="hidden bg-yellow-50 border border-yellow-200 rounded-2xl p-4 flex items-center justify-between">
    <span class="text-yellow-800">⚠️ Primero autoriza el acceso a Google Sheets.</span>
    <a href="/auth" class="bg-yellow-500 hover:bg-yellow-600 text-white font-semibold px-4 py-2 rounded-xl">Autorizar Google</a>
  </div>
  <div id="authOk" class="hidden bg-green-50 border border-green-200 rounded-2xl p-3 flex items-center gap-2 text-green-700 text-xs">
    ✅ Google Sheets autorizado.
  </div>

  <!-- Subject cards -->
  <div id="subjectCards" class="space-y-4"></div>

  <!-- Add subject button -->
  <button onclick="addSubject()" class="w-full border-2 border-dashed border-gray-300 hover:border-blue-400 text-gray-400 hover:text-blue-500 rounded-2xl py-3 transition font-medium">
    + Agregar materia
  </button>

  <!-- Global fields -->
  <div class="bg-white rounded-2xl shadow p-5 space-y-4">
    <h2 class="font-semibold text-gray-700">✏️ Datos del informe</h2>

    <!-- Form URL + Analyze -->
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">URL del Google Form</label>
      <div class="flex gap-2">
        <input id="formUrl" type="text" placeholder="https://docs.google.com/forms/d/e/..."
          class="flex-1 border border-gray-300 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-xs font-mono" />
        <button onclick="analyzeForm()"
          class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-semibold px-4 py-2 rounded-xl transition text-xs whitespace-nowrap flex items-center gap-1">
          <span id="analyzeSpinner" class="hidden animate-spin">⏳</span>
          🔍 Analizar formulario
        </button>
      </div>
      <p id="formAnalysisStatus" class="text-xs text-gray-400 mt-1"></p>
    </div>

    <!-- Dynamic fields section — populated by analyzeForm() -->
    <div id="formFieldsSection" class="hidden space-y-3"></div>

    <button onclick="loadAll()"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition flex items-center justify-center gap-2">
      <span id="loadSpinner" class="hidden animate-spin">⏳</span>
      Cargar y previsualizar
    </button>
    <div id="loadError" class="hidden bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-red-700 text-xs whitespace-pre-line"></div>
  </div>

  <!-- Previews -->
  <div id="previewSection" class="hidden">
    <div class="flex items-center justify-between mb-3">
      <h2 class="font-semibold text-gray-700">👁 Vista previa por curso</h2>
      <button onclick="submitForms()"
        class="bg-green-600 hover:bg-green-700 text-white font-semibold px-5 py-2 rounded-xl transition flex items-center gap-2">
        <span id="sendSpinner" class="hidden animate-spin">⏳</span>
        Enviar formularios
      </button>
    </div>
    <div id="previewList" class="space-y-3"></div>
  </div>

  <!-- Results -->
  <div id="resultsSection" class="hidden bg-white rounded-2xl shadow p-5">
    <h2 class="font-semibold text-gray-700 mb-3">📊 Resultado del envío</h2>
    <div id="resultsList" class="space-y-2"></div>
  </div>

</div>
<script src="app.js"></script>
</body>
</html>
