<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Informes Finales – Google Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    select { background-image: none; }
    .sheet-row:last-child { border-bottom: none; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-sm">
<div class="max-w-2xl mx-auto p-4 space-y-4">

  <!-- Header -->
  <div class="bg-white rounded-2xl shadow p-5 flex items-center justify-between">
    <div>
      <h1 class="text-lg font-bold text-gray-800">📋 Informes Finales</h1>
      <p class="text-gray-400 text-xs mt-0.5">Selecciona las hojas y envía los formularios</p>
    </div>
    <div id="authOk"     class="hidden text-xs text-green-600 font-medium">✅ Autorizado</div>
    <a  id="authNeeded" href="auth" class="hidden bg-yellow-500 text-white text-xs font-semibold px-3 py-2 rounded-xl">Autorizar Google</a>
  </div>

  <!-- Sheet selector -->
  <div class="bg-white rounded-2xl shadow p-5 space-y-3">
    <div class="flex items-center justify-between">
      <h2 class="font-semibold text-gray-700">📄 Hojas de calificaciones</h2>
      <button onclick="openAddSheet()"
        class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-3 py-1.5 rounded-xl transition">
        + Agregar
      </button>
    </div>

    <!-- Add sheet form (hidden by default) -->
    <div id="addSheetForm" class="hidden bg-blue-50 border border-blue-200 rounded-xl p-3 space-y-2">
      <p class="text-xs text-blue-700 font-medium">Pega la URL de Google Sheets — los tabs (1P, 2P, 1Q…) se detectan automáticamente.</p>
      <input id="newSheetUrl" type="text" placeholder="https://docs.google.com/spreadsheets/d/..."
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-blue-400 font-mono" />
      <input id="newSheetMateria" type="text" placeholder="Nombre de la materia (opcional, ej: Guitarra Clásica)"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-blue-400" />
      <div class="flex gap-2">
        <button onclick="confirmAddSheet()"
          class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold py-2 rounded-lg transition">
          Detectar y agregar
        </button>
        <button onclick="closeAddSheet()"
          class="px-4 bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs font-semibold py-2 rounded-lg transition">
          Cancelar
        </button>
      </div>
      <p id="addSheetStatus" class="text-xs text-blue-600"></p>
      <p id="addSheetError" class="hidden text-red-500 text-xs"></p>
    </div>

    <!-- Sheet list -->
    <div id="sheetList" class="divide-y divide-gray-100 rounded-xl border border-gray-100 overflow-hidden"></div>
  </div>

  <!-- Informe config -->
  <div class="bg-white rounded-2xl shadow p-5 space-y-4">
    <h2 class="font-semibold text-gray-700">✏️ Datos del informe</h2>

    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">URL del Google Form</label>
      <div class="flex gap-2">
        <input id="formUrl" type="text" placeholder="https://docs.google.com/forms/d/e/..."
          class="flex-1 border border-gray-300 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-xs font-mono" />
        <button onclick="analyzeForm()"
          class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-semibold px-4 py-2 rounded-xl transition text-xs whitespace-nowrap flex items-center gap-1">
          <span id="analyzeSpinner" class="hidden">⏳</span>
          🔍 Analizar
        </button>
      </div>
      <p id="formAnalysisStatus" class="text-xs text-gray-400 mt-1"></p>
    </div>

    <div id="formFieldsSection" class="hidden space-y-3"></div>

    <div class="flex gap-3">
      <button onclick="loadAll()"
        class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-3 rounded-xl transition flex items-center justify-center gap-2">
        <span id="loadSpinner" class="hidden">⏳</span>
        👁 Vista previa
      </button>
      <button onclick="sendAll()"
        class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition flex items-center justify-center gap-2">
        <span id="sendSpinner" class="hidden">⏳</span>
        📤 Enviar informes
      </button>
    </div>
    <div id="loadError" class="hidden bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-red-700 text-xs whitespace-pre-line"></div>
  </div>

  <!-- Previews -->
  <div id="previewSection" class="hidden">
    <h2 class="font-semibold text-gray-700 mb-3">👁 Vista previa por curso</h2>
    <div id="previewList" class="space-y-3"></div>
  </div>

  <!-- Results -->
  <div id="resultsSection" class="hidden bg-white rounded-2xl shadow p-5">
    <h2 class="font-semibold text-gray-700 mb-3">📊 Resultado del envío</h2>
    <div id="resultsList" class="space-y-2"></div>
  </div>

</div>
<script>
  // Remove stale cache from old versions
  ['sheets_v2','enabled_v2','sheetmeta_v2','formUrl_v2',
   'sheets_v1','enabled_v1','sheetmeta_v1',
   'informeConfig','subjects'].forEach(k => localStorage.removeItem(k));
</script>
<script src="app.js"></script>
</body>
</html>
